type Query {
  node(id: ID!, revision: ID): NodeUnion
  paragraph(id: ID!, revision: ID): ParagraphUnion
  term(id: ID!, revision: ID): TermUnion
  menu(name: MenuAvailable!): Menu
  info: SchemaInformation!
  nodeHomepages(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeHomepageConnection!
  nodeNewsItems(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeNewsConnection!
  nodePages(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodePageConnection!
  nodePlayers(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodePlayerConnection!
  nodeScheduleEntries(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeScheduleEntryConnection!
  nodeTeams(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeTeamConnection!
  paragraphStatItems(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphStatItemConnection!
  termTags(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): TermTagConnection!
  preview(id: ID!, token: String, langcode: String): NodeUnion
  route(path: String!, revision: ID): RouteUnion
}

union NodeUnion = NodeHomepage | NodeNews | NodePage | NodePlayer | NodeScheduleEntry | NodeTeam

type NodeHomepage implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  changed: DateTime!
  created: DateTime!
  ctaDescription: Text
  ctaPrimary: String
  ctaSecondary: String
  ctaTitle: String
  featuredTeamsTitle: String
  heroDescription: Text
  heroSubtitle: String
  heroTitle: String
  langcode: Language!
  path: String
  promote: Boolean!
  statsItems: [ParagraphUnion!]
  status: Boolean!
  sticky: Boolean!
  title: String!
}

interface NodeInterface {
  id: ID!
  uuid: ID!
  changed: DateTime!
  created: DateTime!
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
}

type DateTime {
  timestamp: Timestamp!
  timezone: TimeZone!
  offset: UtcOffset!
  time: Time!
}

type Language {
  id: ID
  name: String
  direction: String
}

interface EdgeNode {
  id: ID!
}

type Text {
  value: String
  processed: Html
  format: String
}

union ParagraphUnion = ParagraphStatItem

type ParagraphStatItem implements ParagraphInterface & EdgeNode {
  id: ID!
  uuid: ID!
  created: DateTime!
  label: String
  langcode: Language!
  number: String
  status: Boolean!
}

interface ParagraphInterface {
  id: ID!
  uuid: ID!
  created: DateTime!
  langcode: Language!
  status: Boolean!
}

type NodeNews implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  body: TextSummary
  category: [TermUnion!]
  changed: DateTime!
  created: DateTime!
  featured: Boolean
  image: Image
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
}

type TextSummary {
  value: String
  processed: Html
  format: String
  summary: Html
}

union TermUnion = TermDivision | TermNewsCategory | TermPosition | TermTag

type TermDivision implements TermInterface {
  id: ID!
  uuid: ID!
  changed: DateTime!
  description: Text!
  langcode: Language!
  name: String!
  parent: TermUnion
  path: String
  status: Boolean!
  weight: Int!
